title   Genesi OS %ARCH% UEFI (Carregar na RAM - rapido, 6GB+ RAM)
sort-key B
# copytoram=y copies the squashfs into RAM once at boot, then runs entirely
# from memory. Off slow media (USB/Ventoy) this turns a multi-minute sluggish
# boot into a one-time ~20s-2min copy + an instant desktop. Needs ~6GB+ RAM
# (the .sfs is ~3GB); 4GB machines must use the default copytoram=n entry.
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=y module_blacklist=pcspkr,vmwgfx i915.modeset=1 amdgpu.modeset=1 nvme_load=yes
