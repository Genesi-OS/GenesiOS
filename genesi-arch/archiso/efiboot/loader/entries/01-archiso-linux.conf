title   Genesi OS %ARCH% UEFI Default
sort-key A
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
# 2026-05-27: dropped nomodeset back out. User verified default works
# in VirtualBox without it once the rest of the X11 stack was in place
# (plasma-x11-session, xorg-server, /etc/X11/xorg.conf.d/10-genesi-noglx
# disabling Xorg's libglx). The earlier "default hangs in VBox" diagnosis
# was a pre-noglx-fix artifact - with libglx not crashing, Xorg falls
# back to whatever DRM is available (vboxvideo on VBoxSVGA, simpledrm on
# UEFI framebuffer, vesa via VBE on BIOS-only) and SDDM reaches Plasma.
# Keeping i915/amdgpu KMS forced for real hardware so the live ISO
# greeter is hardware-accelerated. Fallback entry (with nomodeset) is
# still there for the rare VMSVGA-without-VBoxSVGA case.
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,vmwgfx i915.modeset=1 amdgpu.modeset=1 nvme_load=yes
