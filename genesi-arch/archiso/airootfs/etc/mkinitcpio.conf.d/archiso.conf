HOOKS=(base udev microcode modconf memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)
# zstd decompresses multi-threaded and far faster than xz (single-thread),
# which matters for the live boot off slow media (USB/Ventoy). xz here made
# the kernel sit several extra seconds decompressing the initramfs before
# systemd even started. Matches the squashfs switch to zstd in profiledef.sh.
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-19)
