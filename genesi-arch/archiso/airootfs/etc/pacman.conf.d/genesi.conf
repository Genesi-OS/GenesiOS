# Genesi OS Repository
# Hosted on GitHub raw content

[genesi]
SigLevel = Optional TrustAll
Server = https://raw.githubusercontent.com/Genesi-OS/GenesiOS/main/genesi-arch/repo/$arch

# Large app packages (genesi-code, ...) — hosted on a GitHub Release because
# they exceed GitHub's 100 MB git file limit. Published by publish-apps.yml.
[genesi-apps]
SigLevel = Optional TrustAll
Server = https://github.com/Genesi-OS/GenesiOS/releases/download/apps-repo
