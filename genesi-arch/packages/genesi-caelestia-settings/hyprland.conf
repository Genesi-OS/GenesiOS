# Genesi OS — default Hyprland configuration for the "Hyprland + caelestia-shell"
# desktop option (Roadmap 5.1). Shipped as /etc/skel so every new user inherits
# a working caelestia desktop on first login. Edit freely; this is your file.
#
# The caelestia shell (bar, launcher, notifications, OSDs, wallpaper) is started
# by `caelestia shell -d` below — do NOT also run waybar/swaybg, caelestia owns
# the whole surface.

################################################################################
# Monitors
################################################################################
monitor = , preferred, auto, 1

################################################################################
# Autostart
################################################################################
# Start the caelestia shell daemon (provides the bar + all widgets).
# In a VM the GPU/EGL stack is unreliable and Quickshell (Qt Quick) crashes to a
# black screen, so force the Qt Quick *software* renderer there
# (systemd-detect-virt != none). On real hardware this branch is skipped, so the
# shell keeps full GPU-accelerated rendering/blur. Reproduced + fixed on
# VirtualBox 2026-06-17: bare `caelestia shell -d` painted nothing (black) until
# QT_QUICK_BACKEND=software was exported.
exec-once = sh -c 'if [ "$(systemd-detect-virt)" != none ]; then export QT_QUICK_BACKEND=software LIBGL_ALWAYS_SOFTWARE=1; fi; exec caelestia shell -d'
# Wallpaper: use caelestia's own default (do NOT force the Genesi one). caelestia
# derives its Material You palette from whatever wallpaper is active; set your
# own any time with `caelestia wallpaper -f /path/to/img`.
# PolicyKit agent so GUI apps can request privileges (mounting, etc.).
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# Clipboard history daemon (cliphist), fed by wl-clipboard.
exec-once = wl-paste --watch cliphist store

################################################################################
# Environment
################################################################################
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# Programs
# foot (not kitty/alacritty) is the default terminal: it's a pure-software
# Wayland terminal with NO OpenGL requirement, so it renders in VMs (VirtualBox)
# where GL-based terminals crash to nothing, and it's fast/light on real hardware
# too.
$terminal = foot
$fileManager = dolphin
$browser = firefox

################################################################################
# Look & feel
################################################################################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00aaffee) 45deg
    col.inactive_border = rgba(0d2030aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0d2030cc)
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = windows, 1, 4, easeOutQuint, popin 80%
    animation = fade, 1, 4, easeOutQuint
    animation = workspaces, 1, 5, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = br
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

################################################################################
# Keybinds
################################################################################
$mod = SUPER

# Apps
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $fileManager
bind = $mod, B, exec, $browser
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, F, fullscreen,

# caelestia shell drawers (launcher / session / clipboard).
bind = $mod, Space, exec, caelestia shell drawers toggle launcher
bind = $mod, X, exec, caelestia shell drawers toggle session
# Fallback application launcher if the caelestia drawer is unavailable.
bind = $mod, D, exec, fuzzel
# Clipboard history picker.
bind = $mod, C, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Screenshots (caelestia-cli wraps grim/slurp/swappy).
bind = , Print, exec, caelestia screenshot
bind = $mod, S, exec, caelestia screenshot -r

# Brightness / volume (OSDs are drawn by caelestia).
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Focus movement
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
