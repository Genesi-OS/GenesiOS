[Appearance]
icon_theme=Papirus-Dark
# Dark palette for plain-Qt apps under Hyprland (KDE/KF6 apps read kdeglobals
# instead, but a non-KDE Qt app gets its colours from here). Without a custom
# palette qt6ct hands them the default LIGHT palette → white apps on a dark
# desktop. Fusion is self-drawn and always present (Breeze may be absent on a
# Hyprland-only install, which silently fell back to the light default).
color_scheme_path=/usr/share/qt6ct/colors/genesi-dark.conf
custom_palette=true
standard_dialogs=default
style=Fusion

[Interface]
buttonbox_layout=0
cursor_flash_time=1000
dialog_buttons_have_icons=1
gui_effects=@Invalid()
keyboard_scheme=2
menus_have_icons=true
show_shortcuts_in_context_menus=true
toolbutton_style=4
underline_shortcut=1
wheel_scroll_lines=3
