# Genesi OS — dark colour scheme for qt6ct (non-KDE Qt apps under the Hyprland +
# caelestia session). Installed to /usr/share/qt6ct/colors/ and referenced by
# qt6ct.conf (custom_palette=true). Without this, qt6ct hands plain-Qt apps the
# default LIGHT palette, so apps render white on Genesi's dark desktop. Colours
# match the Genesi KDE scheme (window #0d2030, text #e6f1ee, accent green
# #1d9e75) so Qt apps look the same whether you're on KDE or Hyprland.
#
# Format: 21 ARGB values per group, in QPalette::ColorRole order: WindowText,
# Button, Light, Midlight, Dark, Mid, Text, BrightText, ButtonText, Base, Window,
# Shadow, Highlight, HighlightedText, Link, LinkVisited, AlternateBase, NoRole,
# ToolTipBase, ToolTipText, PlaceholderText.
[ColorScheme]
active_colors=#ffe6f1ee, #ff16334a, #ff1f3e58, #ff17354c, #ff060d15, #ff0c1d2c, #ffe6f1ee, #ffffffff, #ffe6f1ee, #ff0a1722, #ff0d2030, #ff000000, #ff1d9e75, #ffffffff, #ff4ade80, #ff1d9e75, #ff11283a, #ff0d2030, #ff16334a, #ffe6f1ee, #ff7e93a3
disabled_colors=#ff5a6e7e, #ff16334a, #ff1f3e58, #ff17354c, #ff060d15, #ff0c1d2c, #ff5a6e7e, #ffffffff, #ff5a6e7e, #ff0a1722, #ff0d2030, #ff000000, #ff2a4a3e, #ff8aa0b0, #ff4ade80, #ff1d9e75, #ff11283a, #ff0d2030, #ff16334a, #ffe6f1ee, #ff5a6e7e
inactive_colors=#ffe6f1ee, #ff16334a, #ff1f3e58, #ff17354c, #ff060d15, #ff0c1d2c, #ffe6f1ee, #ffffffff, #ffe6f1ee, #ff0a1722, #ff0d2030, #ff000000, #ff1d9e75, #ffffffff, #ff4ade80, #ff1d9e75, #ff11283a, #ff0d2030, #ff16334a, #ffe6f1ee, #ff7e93a3
