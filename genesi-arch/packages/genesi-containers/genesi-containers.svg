<?xml version="1.0" encoding="UTF-8"?>
<!-- Genesi Containers tray icon: a Docker-style "moby" whale carrying stacked
     containers. Shipped into hicolor scalable/apps as genesi-containers.svg so it
     resolves in any icon theme (hicolor is the universal fallback) — the old
     "docker" icon name rendered as a broken placeholder under themes/setups that
     don't ship one. -->
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- stacked containers on the whale's back -->
  <g fill="#2496ED">
    <rect x="14" y="17" width="6" height="6" rx="1"/>
    <rect x="21" y="17" width="6" height="6" rx="1"/>
    <rect x="28" y="17" width="6" height="6" rx="1"/>
    <rect x="21" y="10" width="6" height="6" rx="1"/>
    <rect x="28" y="10" width="6" height="6" rx="1"/>
  </g>
  <!-- whale body -->
  <path fill="#2496ED" d="M8 25h31.5c0 0 1.8 0.2 3.2 1.4 1.2 1 1.8 2.4 1.8 2.4s-1.4 1.1-3 1.1c-1 0-1.9-0.4-1.9-0.4
           C38.5 34.6 33.7 38 26 38 14 38 8 30 8 25z"/>
  <!-- water spout -->
  <path stroke="#2496ED" stroke-width="2" stroke-linecap="round" d="M11 21c-1-2 1-3 0-5"/>
  <!-- eye -->
  <circle cx="14.5" cy="29.5" r="1.4" fill="#ffffff"/>
</svg>
