# Genesi OS — Xfce compositor config (rounded corners + subtle blur), the
# closest xfwm4/picom can get to the KDE "glass" look. Only launched by
# genesi-de-apply on real hardware (never inside a VM). Conservative values so
# it stays smooth on modest GPUs.
backend = "glx";
vsync = true;

corner-radius = 12;
round-borders = 1;

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;

# Keep fully-opaque windows readable; only decorations/edges get the glass.
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 0.9;

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;

# Don't blur/​round these to avoid artefacts.
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'xfce4-panel'"
];
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
