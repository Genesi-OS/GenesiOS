# Genesi MemPalace — system defaults (per-user overlay: ~/.config/genesi-mempalace/config.conf)
#
# MemPalace gives the on-device AI long-term, local-first memory. This file
# configures the Genesi background indexer (genesi-mempalace watch). Everything
# is opt-in: with no paths set, the service is a harmless no-op that just keeps
# the Monitor's status fresh. Format is `key = value`; '#' starts a comment.

# --- What to index ------------------------------------------------------------
# Project directories to mine into the palace (verbatim source + docs). Comma-
# or newline-separated, '~' is expanded. Empty by default — set this per user
# (recommended via ~/.config/genesi-mempalace/config.conf) to your active repos.
# Example: index_paths = ~/projects/genesi, ~/projects/myapp
index_paths =

# Local-AI transcript directories to sweep (one verbatim drawer per message,
# idempotent + resume-safe). Point this at where your AI tools store sessions.
# Example: transcript_dirs = ~/.claude/projects, ~/.config/genesi-code/sessions
transcript_dirs =

# --- Indexer behaviour --------------------------------------------------------
# Seconds between background passes. Lower = fresher memory, more disk churn.
# Default: 900 (15 min). The pass runs at nice 10 / idle IO so it never steals
# cycles from active inference.
watch_interval = 900

# Per-pass timeouts (seconds) so a huge repo can't wedge the loop forever.
mine_timeout = 3600
sweep_timeout = 1800

# --- Storage ------------------------------------------------------------------
# Where the palace lives. Default is MemPalace's own default (~/.mempalace).
# palace_home = ~/.mempalace

# Retrieval backend. ChromaDB (default) needs no external service. Others:
# sqlite_exact (local, exact), qdrant / pgvector (external, opt-in — those send
# verbatim text to the configured server, so only point them at a trusted host).
# backend = chromadb

# --- Install ------------------------------------------------------------------
# Extras to install with the mempalace CLI (genesi-mempalace install). e.g.
# "gpu" for CUDA-accelerated embeddings, or "extract,spellcheck". Empty = core.
install_extras =

# --- Prompt-cache bridge (roadmap 2.7.1) --------------------------------------
# The `genesi-mempalace bridge` proxy sits in front of the Turbo llama-server and
# (1) injects MemPalace memory as a STABLE prefix so the KV cache hits, and
# (2) save/restores a per-wing KV slot to disk so reopening a chat skips the
# prompt prefill (cold-start kill). It is OPT-IN: point your client at the bridge
# port to use it, or straight at Turbo (:11435) to bypass it entirely.
# See docs/MEMPALACE-PROMPT-CACHE.md.

# Port the bridge listens on (ollama=11434, Turbo=11435, bridge=11436).
bridge_port = 11436

# Upstream Turbo llama-server the bridge proxies to.
turbo_url = http://127.0.0.1:11435

# Inject MemPalace recall (search) per turn. Turn off to test pure KV-slot reuse.
bridge_recall = on

# Save/restore the per-wing KV slot via llama-server /slots. Needs Turbo started
# with --slot-save-path (the default). Turn off to disable persistent prompt cache.
bridge_slots = on

# Seconds a wing's stable "core memory" (mempalace wake-up) is cached in the
# bridge before refetching. Higher = fewer mempalace calls, staler core.
core_ttl = 300

# Dynamic top-k recalled snippets injected per turn (kept small on purpose so a
# changing result set only invalidates a short tail, not the cached prefix).
recall_k = 5

# Default wing (project/conversation scope) when a request sets none. Clients
# can override per request via the `X-Genesi-Wing` header or a `genesi_wing` body
# field. One KV slot file is kept per wing.
# default_wing = default

# Where Turbo persists KV slots (must match genesi-ai-turbo's --slot-save-path).
# slot_dir = ~/.cache/genesi-turbo/slots
