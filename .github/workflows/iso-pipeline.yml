name: Genesi ISO Pipeline

# Builds a validated ISO and publishes it as a GitHub Release (fast CDN
# download), separate from publish-packages.yml (the package/update feed).
#
#   Job 1 validate-install : reproduces the Calamares install (dep dry-run +
#                            real pacstrap in a throwaway root). Fails early so
#                            a broken package set never reaches a build.
#   Job 2 build-iso        : runs only if Job 1 passed; mkarchiso -> .iso ->
#                            uploaded as an artifact AND published to a Release:
#                              * tags  v* -> a versioned Release
#                              * main     -> the always-fresh "rolling" Release
#
# ── Why the triggers look the way they do (the "both pipelines race" fix) ────
# Adding a new genesi-* package means: PKGBUILD under genesi-arch/packages/**
# (built by publish-packages.yml) PLUS a reference in the Calamares
# netinstall (the genesi-calamares-config submodule). If the ISO built on the
# SAME push, validate-install would run before publish-packages had published
# the package to the [genesi] repo -> "target not found" -> false failure.
#
# So the ISO no longer builds on package/calamares pushes directly. Instead:
#   * workflow_run: build AFTER publish-packages succeeds on main, when the
#     [genesi] repo already has the new packages. No race, ever.
#   * push:         only for ISO inputs publish-packages does NOT handle
#     (archiso profile / build scripts / this workflow). packages/** and repo/**
#     are excluded so the publish bot-commit + PKGBUILD changes go through the
#     workflow_run path instead of racing here.
#   * tags v*:      cut a versioned Release.
on:
  workflow_run:
    workflows: ["Build and Publish Packages"]
    types: [completed]
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'genesi-arch/**'
      - '!genesi-arch/packages/**'
      - '!genesi-arch/repo/**'
      - '.github/workflows/iso-pipeline.yml'
      - '!**/*.md'
  workflow_dispatch:

# A newer run supersedes an in-flight one (saves Actions minutes).
concurrency:
  group: iso-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create Releases

jobs:
  # ── JOB 1 ────────────────────────────────────────────────────────────────
  validate-install:
    # When triggered by publish-packages completing, only proceed if that run
    # SUCCEEDED and was on main (a failed publish must not build an ISO from a
    # half-published repo). Other events (push to ISO inputs, tag, dispatch)
    # always run.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged   # Level 2 pacstrap needs full caps
    steps:
      - name: 📥 Checkout (com submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # For workflow_run, default checkout = default branch HEAD (main),
          # which already includes the publish bot-commit, so the [genesi] repo
          # served from raw.githubusercontent/main has the new packages.

      - name: 💾 Liberar espaço em disco
        run: |
          df -h / || true
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                 /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          df -h / || true

      - name: 🔑 Preparar pacman/keyring
        run: |
          # CachyOS rotates its repo signing key periodically; the cachyos-v3
          # base image's keyring can lag behind, so `pacman -Sy` aborts with
          #   error: cachyos-extra-v3: signature ... is invalid
          # Refresh the archlinux + cachyos keyrings before any real sync. If the
          # db signature is ALREADY untrusted (catch-22: the sync that fetches the
          # new keyring is the very sync that fails), bootstrap once with
          # SigLevel=Never, then re-init/populate so every later sync verifies.
          if ! pacman -Sy --noconfirm --needed archlinux-keyring cachyos-keyring; then
            echo "::warning::keyring sync failed (stale CachyOS signing key) — bootstrapping with SigLevel=Never"
            cp /etc/pacman.conf /etc/pacman.conf.bak
            sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
            pacman -Sy --noconfirm archlinux-keyring cachyos-keyring || true
            mv /etc/pacman.conf.bak /etc/pacman.conf
          fi
          pacman-key --init || true
          pacman-key --populate archlinux cachyos || true
          # Validation tools (now verify against the fresh keyring)
          pacman -Sy --noconfirm --needed \
            python python-yaml arch-install-scripts

      - name: 🧪 Validar instalação (Nível 1 + Nível 2)
        run: bash genesi-arch/ci/validate-install.sh

  # ── JOB 2 ────────────────────────────────────────────────────────────────
  build-iso:
    needs: validate-install            # só roda se a validação passou
    runs-on: ubuntu-latest
    # R2 creds surfaced as env so the upload step's `if:` can detect whether
    # they're configured. When the repo has no R2 secrets yet, R2_ACCESS_KEY_ID
    # is empty and the upload step is skipped — builds never break on this.
    env:
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:            ${{ vars.R2_BUCKET }}
    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged            # mkarchiso usa loop/mount/squashfs
    steps:
      - name: 📥 Checkout (com submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 💾 Liberar espaço em disco
        run: |
          df -h / || true
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                 /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          pacman -Scc --noconfirm || true
          df -h / || true

      - name: 🔧 Preparar ambiente de build
        run: |
          # CachyOS rotates its repo signing key periodically; the cachyos-v3
          # base image's keyring can lag behind, so `pacman -Sy` aborts with
          #   error: cachyos-extra-v3: signature ... is invalid
          # Each job runs in a FRESH container, so refresh the keyrings here too
          # (Job 1's refresh doesn't carry over). Bootstrap with SigLevel=Never
          # if the db signature is already untrusted, then re-init/populate.
          if ! pacman -Sy --noconfirm --needed archlinux-keyring cachyos-keyring; then
            echo "::warning::keyring sync failed (stale CachyOS signing key) — bootstrapping with SigLevel=Never"
            cp /etc/pacman.conf /etc/pacman.conf.bak
            sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
            pacman -Sy --noconfirm archlinux-keyring cachyos-keyring || true
            mv /etc/pacman.conf.bak /etc/pacman.conf
          fi
          pacman-key --init || true
          pacman-key --populate archlinux cachyos || true

          # mkarchiso roda como root; prepare-and-build.sh espera um usuário
          # NÃO-root + sudo (recusa rodar como root). Criamos esse usuário.
          # archiso + the host tools the profile's bootmodes need:
          #   uefi.grub  -> grub (grub-install)      bios.syslinux -> syslinux
          #   EFI image  -> mtools + dosfstools       ISO           -> libisoburn (xorriso)
          #   squashfs airootfs -> squashfs-tools
          pacman -Sy --noconfirm --needed archiso sudo base-devel git \
            grub syslinux mtools dosfstools libisoburn squashfs-tools
          # The build-driver scripts are committed without the exec bit
          # (Windows checkouts), so `sudo ./buildiso.sh` -> "command not found".
          # mkarchiso handles airootfs script perms itself via profiledef.sh.
          chmod +x genesi-arch/*.sh
          useradd -m builder || true
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🏗️ Build da ISO
        run: |
          # buildiso.sh writes the ISO and only THEN runs optional post-steps
          # (sha1 checksum + GPG sign). Those post-steps fail in CI (no GPG
          # key/agent) and abort buildiso with a non-zero exit AFTER the ISO is
          # already complete. So don't let that fail the job: run it, then
          # verify the ISO exists and decide based on that.
          sudo -u builder env CI=true bash -lc '
            cd "'"$GITHUB_WORKSPACE"'/genesi-arch" && bash prepare-and-build.sh
          ' || echo "::warning::buildiso exited non-zero (post-build checksum/sign); verifying ISO exists..."
          ISO=$(find genesi-arch/out -name '*.iso' -type f | head -n1)
          if [ -z "$ISO" ]; then
            echo "::error::No ISO was produced - real build failure"
            exit 1
          fi
          echo "ISO_PATH=$ISO" >> "$GITHUB_ENV"
          echo "✅ ISO produzida: $ISO ($(du -h "$ISO" | cut -f1))"

      - name: 📊 Checksum da ISO
        run: |
          sha256sum "$ISO_PATH" | tee "$ISO_PATH.sha256"

      - name: 📤 Upload ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: genesi-os-iso
          path: |
            genesi-arch/out/**/*.iso
            genesi-arch/out/**/*.iso.sha256
          retention-days: 14
          if-no-files-found: error

      # ── Single-file ISO on Cloudflare R2 (the download for the website) ────
      # R2 has no 2GB cap and ZERO egress cost. We upload the FULL ISO under ONE
      # fixed key (genesi-os-latest.iso) so every build OVERWRITES the previous
      # one — R2 storage stays at a single ~3.2GB object, permanently inside the
      # 10GB free tier => $0. (Versioned/pinned ISOs live as the free GitHub
      # Release parts instead, so nothing ever accumulates on R2 and bills you.)
      # Skipped automatically until R2 secrets are set.
      - name: ☁️ Upload single ISO to Cloudflare R2
        if: ${{ env.R2_ACCESS_KEY_ID != '' }}
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed rclone
          # Configure an rclone S3 remote for R2 entirely via env (no config file).
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "⬆️  $(du -h "$ISO_PATH" | cut -f1) -> r2:${R2_BUCKET}/genesi-os-latest.iso (overwrite)"
          # copyto to a fixed key overwrites in place; rclone aborts (doesn't
          # leave orphaned multipart parts) on failure, so storage stays bounded.
          rclone copyto "$ISO_PATH" "R2:${R2_BUCKET}/genesi-os-latest.iso" \
            --s3-no-check-bucket --stats-one-line --stats 30s

          # Tiny checksum sidecar (also overwritten each build).
          sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os-latest.iso"}' > latest.iso.sha256
          rclone copyto latest.iso.sha256 "R2:${R2_BUCKET}/genesi-os-latest.iso.sha256" \
            --s3-no-check-bucket

          echo "✅ Uploaded single-file ISO to R2 (one object, overwritten — \$0 storage)"

      # ── GitHub Release (tags only) ─────────────────────────────────────────
      # The full ISO lives on Cloudflare R2 as ONE file (no 2GB cap, $0 egress).
      # GitHub Release assets are capped at 2GB, so a tagged Release carries just
      # the checksum + notes and points at the R2 download.
      #
      # We deliberately do NOT split the ISO into <2GB parts anymore: splitting
      # wrote a second ~3.2GB copy next to the ISO and blew the runner's disk
      # ("No space left on device", run #15). R2 already serves the single file,
      # so the parts were redundant. Non-tag builds publish nothing to GitHub
      # Releases (R2's genesi-os-latest.iso is the rolling download); the slow
      # Actions artifact above remains as a backup.
      - name: 🧾 Preparar checksum p/ Release (tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        run: sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os-latest.iso"}' > genesi-os-latest.iso.sha256

      - name: 🚀 Publicar Release versionado (tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: genesi-os-latest.iso.sha256
          body: |
            ## Download

            The Genesi OS ISO is a single file on Cloudflare R2 (fast CDN, resumable):

            **https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso**

            ```bash
            aria2c -x16 -s16 https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso
            sha256sum -c genesi-os-latest.iso.sha256
            ```
            `genesi-os-latest.iso` always tracks the newest `main` build.
